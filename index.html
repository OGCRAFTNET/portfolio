<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon | ogcraftnet studios</title>
    <style>
      
        :root {
            --bg-color: #fafafa;
            --text-main: #111827;
            --text-muted: #6b7280;
            --card-bg: #ffffff;
            --card-border: #e5e7eb;
            --card-hover: #f3f4f6;
        }

        
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0f1115;
                --text-main: #f9fafb;
                --text-muted: #9ca3af;
                --card-bg: #1a1d24;
                --card-border: #2d313a;
                --card-hover: #232730;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.5;
            transition: background-color 0.3s, color 0.3s;
            display: flex;
            justify-content: center;
            padding: 50px 20px;
        }

        .portfolio {
            max-width: 650px;
            width: 100%;
        }

    
        .profile-header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 40px;
        }

        .profile-pic {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--card-border);
        }

        .profile-info h1 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .profile-info .subtitle {
            font-size: 16px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .profile-info .bio {
            font-size: 15px;
        }

        .highlight {
            font-weight: 600;
            color: var(--text-main);
        }

      
        h2 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 8px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        
        .projects-section {
            margin-bottom: 40px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 12px;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 16px 20px;
            border-radius: 10px;
            transition: all 0.2s ease;
        }

        .card:hover {
            background-color: var(--card-hover);
            border-color: var(--text-muted);
        }

        .card h3 {
            font-size: 16px;
            margin-bottom: 4px;
        }

        .card p {
            font-size: 14px;
            color: var(--text-muted);
        }

      
        .socials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
        }

        .social-btn {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .social-btn:hover {
            background-color: var(--text-main);
            color: var(--bg-color);
        }

        .discord-btn:hover {
            background-color: #5865F2;
            color: white;
            border-color: #5865F2;
        }

        @media (max-width: 600px) {
            .profile-header {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <main class="portfolio">
        
        
        <header class="profile-header">
            <img src="https://github.com/ogcraftnet.png" alt="Simon" class="profile-pic">
            
            <div class="profile-info">
                <h1>Hi, I'm Simon</h1>
                <p class="subtitle">Also known as <span class="highlight">SimFlix</span></p>
                <p class="bio">The guy behind <span class="highlight">ogcraftnet studios</span>.</p>
            </div>
        </header>

        
        <section class="projects-section">
            <h2>Projects</h2>
            <div class="grid">
                
                <div class="card">
                    <h3>TrueLightFX</h3>
                    <p>Minecraft shader</p>
                </div>
                
                <div class="card">
                    <h3>TrueLightFX Lite</h3>
                    <p>Inspired by vibrant visuals</p>
                </div>

                <div class="card">
                    <h3>arctis client</h3>
                    <p>Custom Minecraft client</p>
                </div>

                <div class="card">
                    <h3>ogcraftnet studios</h3>
                    <p>Development studio</p>
                </div>

            </div>
        </section>

        
        <section class="links-section">
            <h2>Connect</h2>
            <div class="socials-grid">
                
                <a href="https://discord.com/users/ogcraftnet" target="_blank" class="social-btn discord-btn">
                    Discord (@ogcraftnet)
                </a>
                
                <a href="https://github.com/ogcraftnet" target="_blank" rel="noopener noreferrer" class="social-btn">
                    GitHub
                </a>
                
                <a href="https://modrinth.com/user/ogcraftnet-studios" target="_blank" rel="noopener noreferrer" class="social-btn">
                    Modrinth
                </a>
                
                <a href="https://www.curseforge.com/members/ogcraftnet_studios" target="_blank" rel="noopener noreferrer" class="social-btn">
                    CurseForge
                </a>

            </div>
        </section>

    </main>
</body>
</html>
